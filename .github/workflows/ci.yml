name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        # Gates merges on ESLint errors. Warnings are allowed (React 19
        # compiler rules like `set-state-in-effect` and `purity` are
        # demoted to warn in eslint.config.mjs because they flag safe
        # patterns and would need per-call-site refactors).
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders so Next.js doesn't fail on missing env at compile.
          # Real values come from Vercel project env on deploy.
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          AUTH_SECRET: ci-placeholder-secret-do-not-use
